<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="50%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Graduation cap top (diamond) -->
  <polygon points="50,12 82,30 50,48 18,30" fill="url(#g)"/>

  <!-- Cap brim (curved sides) -->
  <path d="M30,38 L30,52 C30,62 70,62 70,52 L70,38" fill="url(#g)" opacity="0.85"/>

  <!-- Tassel pole -->
  <line x1="22" y1="30" x2="22" y2="58" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>

  <!-- Tassel ball -->
  <circle cx="22" cy="62" r="5" fill="url(#g)"/>

  <!-- Flow wave (bottom) -->
  <path d="M18,80 C28,68 42,68 50,76 C58,84 72,78 82,66"
        fill="none" stroke="url(#g)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
